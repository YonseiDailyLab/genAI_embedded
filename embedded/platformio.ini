; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[platformio]
default_envs = lolin_s3_pro_idf

[env:lolin_s3_pro_idf]
platform = espressif32
board = lolin_s3_pro
framework = arduino, espidf
extra_scripts = pre:scripts/patch_aifes.py

; Arduino-ESP32 2.x는 ESP-IDF v4.4 기반이라, 하이브리드(Arduino as component)일 땐
; IDF를 4.4.x로 맞추는 게 호환성이 좋습니다.
platform_packages =
  framework-espidf @ ~3.40407.0

; 16MB flash + OTA + SPIFFS (Arduino default_16MB.csv와 동일한 구성)
board_build.partitions = partitions_16mb_ota.csv

; ESP32-S3에서 USB-C 포트로 Serial 모니터를 쓰려면(특히 IDF+Arduino 하이브리드),
; Arduino의 Serial을 USB(USB-Serial/JTAG)로 매핑하는 매크로를 명시적으로 주는 게 안전합니다.
build_flags =
  -DARDUINO_USB_MODE=1
  -DARDUINO_USB_CDC_ON_BOOT=1
  -Wno-error=maybe-uninitialized
  -DPIN_MP801=7
  -DPIN_MQ7=15
  -DPIN_MQ131=16
  -DMQ131_RL_KOHM=10
  -DMQ131_CLEAN_AIR_RATIO=15

; AIfES (Arduino 포팅) - GitHub로 고정(재현 가능한 빌드)
lib_deps =
  https://github.com/Fraunhofer-IMS/AIfES_for_Arduino.git#01dea8b994c0872b7f6d7816e54651f6800c4a0d
  neosarchizo/AM1008W-K I2C @ ~1.0.0
  knolleary/PubSubClient
  adafruit/Adafruit BMP085 Library
  miguel5612/MQUnifiedsensor

monitor_speed = 115200

; (옵션) S3(프로가 아닌 보드)로도 빌드해보고 싶으면 이 env를 사용하세요.
;   pio run -e lolin_s3_idf
[env:lolin_s3_idf]
platform = espressif32
board = lolin_s3
framework = arduino, espidf
extra_scripts = pre:scripts/patch_aifes.py
platform_packages =
  framework-espidf @ ~3.40407.0
board_build.partitions = partitions_16mb_ota.csv
build_flags =
  -DARDUINO_USB_MODE=1
  -DARDUINO_USB_CDC_ON_BOOT=1
  -Wno-error=maybe-uninitialized
  -DPIN_MP801=7
  -DPIN_MQ7=15
  -DPIN_MQ131=16
  -DMQ131_RL_KOHM=10
  -DMQ131_CLEAN_AIR_RATIO=15
lib_deps =
  https://github.com/Fraunhofer-IMS/AIfES_for_Arduino.git#01dea8b994c0872b7f6d7816e54651f6800c4a0d
  neosarchizo/AM1008W-K I2C @ ~1.0.0
  knolleary/PubSubClient
  adafruit/Adafruit BMP085 Library
  miguel5612/MQUnifiedsensor
monitor_speed = 115200
